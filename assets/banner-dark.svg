<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#388bfd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subtle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="6"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  
  <!-- Accent line -->
  <rect x="0" y="194" width="900" height="6" fill="url(#accent)" rx="0"/>
  
  <!-- Data flow dots (subtle) -->
  <g opacity="0.12">
    <circle cx="680" cy="45" r="2" fill="#58a6ff"/>
    <circle cx="700" cy="45" r="2" fill="#58a6ff"/>
    <circle cx="720" cy="45" r="2" fill="#58a6ff"/>
    <circle cx="740" cy="45" r="2" fill="#388bfd"/>
    <circle cx="760" cy="45" r="2" fill="#388bfd"/>
    <circle cx="780" cy="45" r="3" fill="#388bfd"/>
    <circle cx="800" cy="45" r="3" fill="#1f6feb"/>
    <circle cx="825" cy="45" r="4" fill="#1f6feb"/>
    <circle cx="855" cy="45" r="5" fill="#1f6feb"/>
    
    <circle cx="680" cy="155" r="2" fill="#58a6ff"/>
    <circle cx="700" cy="155" r="2" fill="#58a6ff"/>
    <circle cx="720" cy="155" r="2" fill="#58a6ff"/>
    <circle cx="740" cy="155" r="2" fill="#388bfd"/>
    <circle cx="760" cy="155" r="2" fill="#388bfd"/>
    <circle cx="780" cy="155" r="3" fill="#388bfd"/>
    <circle cx="800" cy="155" r="3" fill="#1f6feb"/>
    <circle cx="825" cy="155" r="4" fill="#1f6feb"/>
    <circle cx="855" cy="155" r="5" fill="#1f6feb"/>
  </g>
  
  <!-- Architecture hint arrows (very subtle) -->
  <g opacity="0.06" fill="none" stroke="#58a6ff" stroke-width="1">
    <path d="M 660 100 L 700 100 L 700 70 L 740 70"/>
    <path d="M 660 100 L 700 100 L 700 130 L 740 130"/>
    <path d="M 760 70 L 800 70 L 800 100 L 840 100"/>
    <path d="M 760 130 L 800 130 L 800 100"/>
  </g>
  
  <!-- Name -->
  <text x="50" y="80" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">Saran Teja Mallela</text>
  
  <!-- Title -->
  <text x="50" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.3">Data Engineer</text>
  
  <!-- Separator dot -->
  <circle cx="172" cy="110" r="2" fill="#30363d"/>
  
  <!-- Subtitle -->
  <text x="184" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#6e7681" letter-spacing="0.2">Streaming · Lakehouse · Dimensional Modeling · Cloud-Native</text>
  
  <!-- Bottom tagline -->
  <text x="50" y="155" font-family="'Segoe UI Semibold', system-ui, -apple-system, sans-serif" font-size="13" fill="#484f58" letter-spacing="0.5">I don't just use tools. I choose architectures.</text>
</svg>
